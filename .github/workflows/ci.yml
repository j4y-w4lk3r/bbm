name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: stable
          cache: true

      - name: go vet
        run: go vet ./...

      - name: go test
        run: go test -race -count=1 ./...

      - name: go build (all packages)
        # Catches "package compiles but binary refuses to link" before tag time.
        run: go build ./...

  goreleaser-build:
    # Cross-build the binaries goreleaser would produce, but skip
    # publishing. Catches real release-time errors (missing files,
    # invalid template syntax, broken cross-compile) without the
    # `goreleaser check` brittleness.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version: stable
          cache: true
      - uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: "~> v2"
          args: build --snapshot --clean
