name: release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # goreleaser needs full history + tags to compute changelog
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: stable
          cache: true

      - uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
        env:
          # Auto-provided; used to create the GitHub Release + upload assets
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Fine-grained PAT with Contents:read+write on j4y-w4lk3r/homebrew-bbm
          HOMEBREW_TAP_GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}
          # Non-SK ed25519 SSH private key whose public half is registered
          # on the AUR profile of `j4y-w4lk3r`. Goreleaser's aurs: stage
          # uses it to git-push the rendered PKGBUILD + .SRCINFO to
          # ssh://aur@aur.archlinux.org/bbm-bin.git on every tag.
          AUR_SSH_PRIVATE_KEY: ${{ secrets.AUR_SSH_PRIVATE_KEY }}
